<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin Bappeda | SIG LULC Badung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- Decorative Gradients -->
    <div class="absolute w-96 h-96 rounded-full bg-blue-600/20 blur-3xl -top-10 -left-10 animate-pulse"></div>
    <div class="absolute w-96 h-96 rounded-full bg-indigo-600/20 blur-3xl -bottom-10 -right-10 animate-pulse"></div>

    <div class="w-full max-w-md p-8 bg-slate-800/80 backdrop-blur-md rounded-3xl border border-slate-700 shadow-2xl relative z-10">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-white tracking-tighter">
                SIG <span class="text-blue-500">LULC</span> <span class="text-slate-400 font-medium">| Badung</span>
            </h1>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">Portal Admin Bappeda</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-2xl text-xs font-bold mb-6 flex items-center gap-2">
            <span>⚠️</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label for="username" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                <input type="text" id="username" name="username" required placeholder="Masukkan username admin" 
                       class="w-full bg-slate-900/50 border border-slate-700 hover:border-slate-600 focus:border-blue-500 rounded-2xl px-4 py-3.5 text-sm font-semibold text-white focus:outline-none focus:ring-1 focus:ring-blue-500 transition duration-150">
            </div>

            <div>
                <label for="password" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" 
                       class="w-full bg-slate-900/50 border border-slate-700 hover:border-slate-600 focus:border-blue-500 rounded-2xl px-4 py-3.5 text-sm font-semibold text-white focus:outline-none focus:ring-1 focus:ring-blue-500 transition duration-150">
            </div>

            <button type="submit" 
                    class="w-full py-4 px-6 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-black rounded-2xl shadow-lg shadow-blue-600/20 transition duration-150">
                Masuk ke Panel Admin
            </button>
        </form>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="/" class="text-xs font-bold text-slate-500 hover:text-slate-400 transition-colors">
                ← Kembali ke Beranda Publik
            </a>
        </div>
    </div>
</body>
</html>
