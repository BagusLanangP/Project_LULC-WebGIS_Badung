<!DOCTYPE html>
<html>
<head>
    <title>WebGIS Badung 2030</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

</head>
<body class="bg-slate-100">
    <nav class="bg-white border-b border-slate-200 shadow-lg sticky top-0 z-[1000] w-full">
    <div class="w-full px-6 lg:px-10">
        <div class="flex justify-between items-center h-16">
            
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="p-2 rounded-lg hover:bg-slate-100 transition-colors text-slate-600 focus:outline-none">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    </svg>
                </button>

                <span class="text-xl md:text-2xl font-black text-slate-800 tracking-tighter">
                    SIG <span class="text-blue-600">LULC</span> <span class="hidden md:inline">Kabupaten Badung</span>
                </span>
            </div>

            <div class="flex items-center">
                <button class="flex bg-slate-100 rounded-full hover:bg-slate-200 border border-slate-200 shadow-sm transition-all">
                    <svg class="h-10 w-10 text-slate-600 p-2" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <div class="flex h-[calc(100vh-64px)] overflow-hidden">

    <div class="w-80 h-full flex flex-col">
        
        <div class="p-6 border-b border-slate-100">
            <h2 class="text-xl font-bold text-slate-800 tracking-tight">Menu Navigasi</h2>
        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl bg-blue-50 text-blue-700 font-semibold transition-all hover:bg-blue-100 group">
                <span class="text-xl group-hover:scale-110 transition-transform">🏠</span>
                <span>Beranda</span>
            </a>

            <a href="#" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 font-medium transition-all hover:bg-slate-50 hover:text-slate-900 group">
                <span class="text-xl group-hover:scale-110 transition-transform">📊</span>
                <span>Analisis Statistik</span>
            </a>

            <a href="#" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 font-medium transition-all hover:bg-slate-50 hover:text-slate-900 group">
                <span class="text-xl group-hover:scale-110 transition-transform">🗺️</span>
                <span>Peta Interaktif</span>
            </a>

            <a href="#" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 font-medium transition-all hover:bg-slate-50 hover:text-slate-900 group">
                <span class="text-xl group-hover:scale-110 transition-transform">🔮</span>
                <span>Proyeksi 2030</span>
            </a>

            <hr class="my-4 border-slate-100">

            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Kontrol Peta</p>
                <label for="yearSelect" class="text-sm font-semibold text-slate-700">Pilih Tahun Analisis</label>
                <select id="yearSelect" class="w-full mt-2 p-3 bg-white border border-slate-200 rounded-xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-700 font-medium">
                    <option value="2030" selected>Tahun 2030 (Prediksi)</option>
                    <option value="2025">Tahun 2025 (Validasi)</option>
                    <option value="2020">Tahun 2020 (Aktual)</option>
                </select>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-100 bg-slate-50 text-center">
            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">SIG LULC BADUNG &copy; 2024</p>
        </div>
    </div>
</aside>

    <main id="mainContent" class="flex-1 relative transition-all duration-300">
        <div id="map" class="h-full w-full"></div>
    </main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/map_init.js') }}"></script>
    <script src="{{ url_for('static', filename='js/data_viz.js') }}"></script>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const mapContainer = document.getElementById('mainContent');

    sidebarToggle.onclick = function() {
        // Cek apakah sidebar sedang tertutup (lebar 0)
        if (sidebar.classList.contains('w-0')) {
            // BUKA SIDEBAR
            sidebar.classList.remove('w-0');
            sidebar.classList.add('w-80');
        } else {
            // TUTUP SIDEBAR
            sidebar.classList.remove('w-80');
            sidebar.classList.add('w-0');
        }

        // PENTING: Karena ukuran div peta berubah, Leaflet harus di-refresh
        setTimeout(() => {
            map.invalidateSize(); 
        }, 300); // 300ms sesuai durasi transisi CSS
    };
});
</script>
</html>
